<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dla Ciebie</title>
    <style>
        body { background: white; color: black; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; text-align: center; }
        h1 { font-size: 2.2rem; margin-bottom: 30px; padding: 0 20px; font-weight: bold; }
        .box { border: 2px solid black; padding: 25px; margin: 15px; width: 85%; max-width: 350px; min-height: 150px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        input { width: 80%; padding: 12px; margin: 10px 0; border: 1px solid black; font-size: 1rem; text-align: center; outline: none; background: white; color: black; }
        button { background: black; color: white; border: none; padding: 12px 25px; font-weight: bold; cursor: pointer; width: 85%; }
        audio { width: 100%; margin-top: 15px; }
        .hidden { display: none; }
        p { font-size: 1.1rem; line-height: 1.4; margin: 10px 0; }
    </style>
</head>
<body>

    <h1>Wszystkiego Najlepszego Kochanie :*</h1>

    <!-- 1. EKRAN STARTOWY (GŁÓWNE HASŁO) -->
    <div id="gatekeeper" class="box">
        <p>Aby wejść, wpisz hasło:</p>
        <input type="password" id="main-pass" placeholder="...">
        <button onclick="unlockMain()">OTWÓRZ</button>
    </div>

    <!-- 2. ZAWARTOŚĆ STRONY -->
    <div id="main-content" class="hidden" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
        
        <!-- SEKCJA 1 -->
        <div class="box">
            <div id="lock1">
                <input type="password" id="pass1" placeholder="Hasło...">
                <button onclick="unlockAudio(1, HASLO_1)">ODBLOKUJ</button>
            </div>
            <div id="content1" class="hidden">
                <p>Jesteś dla mnie bardzo ważna...</p>
                <audio id="audio1" controls><source src="audio1.mp3" type="audio/mpeg"></audio>
            </div>
        </div>

        <!-- SEKCJA 2 -->
        <div class="box">
            <div id="lock2">
                <input type="password" id="pass2" placeholder="Hasło...">
                <button onclick="unlockAudio(2, HASLO_2)">ODBLOKUJ</button>
            </div>
            <div id="content2" class="hidden">
                <p>...dlatego tutaj jest coś bardzo ważnego kochanie...</p>
                <audio id="audio2" controls><source src="audio2.mp3" type="audio/mpeg"></audio>
            </div>
        </div>

    </div>

    <script>
        // --- TUTAJ ZMIEŃ SWOJE HASŁA ---
        const HASLO_GLOWNE = "KOCHAMCIE";   // Hasło do wejścia na stronę
        const HASLO_1 = "UWIELBIAM";       // Hasło do pierwszej wiadomości
        const HASLO_2 = "PRAGNE";       // Hasło do drugiej wiadomości

        function unlockMain() {
            const input = document.getElementById('main-pass').value;
            if (input === HASLO_GLOWNE) {
                document.getElementById('gatekeeper').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
            } else {
                alert("Nieprawidłowe hasło!");
            }
        }

        function unlockAudio(num, correctPass) {
            const input = document.getElementById('pass' + num).value;
            if (input === correctPass) {
                document.getElementById('lock' + num).classList.add('hidden');
                document.getElementById('content' + num).classList.remove('hidden');
                document.getElementById('audio' + num).play();
            } else {
                alert("To nie to hasło...");
            }
        }
    </script>
</body>
</html>
