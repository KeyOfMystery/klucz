<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dla Ciebie</title>
    <style>
        /* Reset i tło */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: white;
            color: black;
            font-family: "Arial", sans-serif;
            text-align: center;
            overflow: hidden;
        }

        /* Napis na górze - stały i duży */
        .main-header {
            font-size: 2.2rem;
            font-weight: bold;
            position: fixed;
            top: 40px;
            width: 100%;
            padding: 0 20px;
            box-sizing: border-box;
            z-index: 100;
        }

        /* Główna ramka */
        .box {
            border: 2px solid black;
            padding: 30px;
            width: 85%;
            max-width: 380px;
            box-sizing: border-box;
            background: white;
            z-index: 10;
        }

        /* Style pól tekstowych */
        input {
            width: 100%;
            padding: 15px;
            margin: 15px 0;
            border: 1px solid black;
            font-size: 1rem;
            text-align: center;
            box-sizing: border-box;
            outline: none;
        }

        /* Przyciski */
        button {
            width: 100%;
            padding: 15px;
            background: black;
            color: white;
            border: none;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 1rem;
        }

        /* Naprawa odtwarzacza na mobile */
        audio {
            width: 100%;
            height: 54px; /* Kluczowe dla widoczności na iPhone */
            margin-top: 20px;
            display: block;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.4;
            margin: 0 0 15px 0;
        }

        .hidden {
            display: none;
        }

        /* Specjalny styl dla przycisku DALEJ */
        .btn-next {
            background: white;
            color: black;
            border: 1px solid black;
            margin-top: 25px;
        }
    </style>
</head>
<body>

    <div class="main-header">Wszystkiego Najlepszego Kochanie :*</div>

    <div id="stage1" class="box">
        <p>Aby wejść, wpisz hasło:</p>
        <input type="password" id="pass-stage1" placeholder="Password 1">
        <button onclick="goToStage2()">OTWÓRZ</button>
    </div>

    <div id="stage2" class="box hidden">
        <div id="lock-audio1">
            <p>Wpisz drugie hasło:</p>
            <input type="password" id="pass-stage2" placeholder="Password 2">
            <button onclick="unlockAudio1()">NIESPODZIANKA A</button>
        </div>
        <div id="content-audio1" class="hidden">
            <p>Jesteś dla mnie bardzo ważna...</p>
            <audio id="audio1" controls preload="auto">
                <source src="audio1.mp3" type="audio/mpeg">
                Twoja przeglądarka nie obsługuje audio.
            </audio>
            <button onclick="goToStage3()" class="btn-next">DALEJ →</button>
        </div>
    </div>

    <div id="stage3" class="box hidden">
        <div id="lock-audio2">
            <p>Wpisz ostatnie hasło:</p>
            <input type="password" id="pass-stage3" placeholder="Password 3">
            <button onclick="unlockAudio2()">NIESPODZIANKA B</button>
        </div>
        <div id="content-audio2" class="hidden">
            <p>dlatego tutaj jest coś bardzo ważnego...</p>
            <audio id="audio2" controls preload="auto">
                <source src="audio2.mp3" type="audio/mpeg">
                Twoja przeglądarka nie obsługuje audio.
            </audio>
        </div>
    </div>

    <script>
        const H1 = "KOCHAMCIE";
        const H2 = "UWIELBIAM";
        const H3 = "PRAGNE";

        function goToStage2() {
            const val = document.getElementById('pass-stage1').value.toUpperCase().trim();
            if (val === H1) {
                document.getElementById('stage1').classList.add('hidden');
                document.getElementById('stage2').classList.remove('hidden');
            } else { alert("Błędne hasło!"); }
        }

        function unlockAudio1() {
            const val = document.getElementById('pass-stage2').value.toUpperCase().trim();
            if (val === H2) {
                document.getElementById('lock-audio1').classList.add('hidden');
                document.getElementById('content-audio1').classList.remove('hidden');
            } else { alert("To nie to hasło..."); }
        }

        function goToStage3() {
            document.getElementById('stage2').classList.add('hidden');
            document.getElementById('stage3').classList.remove('hidden');
        }

        function unlockAudio2() {
            const val = document.getElementById('pass-stage3').value.toUpperCase().trim();
            if (val === H3) {
                document.getElementById('lock-audio2').classList.add('hidden');
                document.getElementById('content-audio2').classList.remove('hidden');
            } else { alert("Niepoprawne hasło!"); }
        }
    </script>
</body>
</html>
