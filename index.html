<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dla Ciebie</title>
    <style>
        /* Główne style dla wyśrodkowania na każdej stronie */
        html, body {
            height: 100%;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: white;
            color: black;
            font-family: "Arial", sans-serif;
            text-align: center;
            overflow: hidden; /* Zapobiega przewijaniu */
        }

        /* Styl dla nagłówka na górze każdej strony, idealnie wyśrodkowany */
        .main-header {
            font-size: 2.5rem; /* Zwiększony napis */
            font-weight: bold;
            position: fixed; /* Stała pozycja na górze */
            top: 20px;
            width: 100%;
            padding: 0 20px;
            box-sizing: border-box;
            z-index: 100; /* Zawsze na górze */
        }

        /* Styl dla kontenera box, wyśrodkowany */
        .box {
            border: 2px solid black;
            padding: 40px;
            width: 90%;
            max-width: 400px;
            box-sizing: border-box;
            background: white;
            z-index: 10;
        }

        /* Style dla pól wprowadzania */
        input {
            width: 100%;
            padding: 15px;
            margin: 15px 0;
            border: 1px solid black;
            font-size: 1rem;
            text-align: center;
            box-sizing: border-box;
        }

        /* Style dla przycisków - neutralne */
        button {
            width: 100%;
            padding: 15px;
            background: black;
            color: white;
            border: none;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        button:hover {
            opacity: 0.8;
        }

        /* Styl dla odtwarzacza audio */
        audio {
            width: 100%;
            margin-top: 20px;
        }

        /* Klasa do ukrywania elementów */
        .hidden {
            display: none;
        }
    </style>
</head>
<body>

    <div class="main-header">Wszystkiego Najlepszego Kochanie :*</div>

    <div id="stage1" class="box">
        <p>Aby wejść, wpisz hasło:</p>
        <input type="password" id="pass-stage1" placeholder="Password 1">
        <button onclick="goToStage2()">OTWÓRZ</button>
    </div>

    <div id="stage2" class="box hidden">
        <div id="lock-audio1">
            <p>Wpisz drugie hasło:</p>
            <input type="password" id="pass-stage2" placeholder="Password 2">
            <button onclick="unlockAudio1()">NIESPODZIANKA A</button>
        </div>
        <div id="content-audio1" class="hidden">
            <audio id="audio1" controls preload="auto">
                <source src="audio1.mp3" type="audio/mpeg">
            </audio>
            <br><br>
            <button onclick="goToStage3()" style="background: white; color: black; border: 1px solid black;">DALEJ →</button>
        </div>
    </div>

    <div id="stage3" class="box hidden">
        <div id="lock-audio2">
            <p>Wpisz ostatnie hasło:</p>
            <input type="password" id="pass-stage3" placeholder="Password 3">
            <button onclick="unlockAudio2()">NIESPODZIANKA B</button>
        </div>
        <div id="content-audio2" class="hidden">
            <audio id="audio2" controls preload="auto">
                <source src="audio2.mp3" type="audio/mpeg">
            </audio>
        </div>
    </div>

    <script>
        // HASŁA
        const H1 = "KOCHAMCIE"; // Password 1
        const H2 = "UWIELBIAM";  // Password 2
        const H3 = "PRAGNE";     // Password 3

        function goToStage2() {
            if (document.getElementById('pass-stage1').value.toUpperCase() === H1) {
                document.getElementById('stage1').classList.add('hidden');
                document.getElementById('stage2').classList.remove('hidden');
            } else { alert("Błędne hasło!"); }
        }

        function unlockAudio1() {
            if (document.getElementById('pass-stage2').value.toUpperCase() === H2) {
                document.getElementById('lock-audio1').classList.add('hidden');
                document.getElementById('content-audio1').classList.remove('hidden');
                document.getElementById('audio1').play();
            } else { alert("To nie to hasło..."); }
        }

        function goToStage3() {
            document.getElementById('stage2').classList.add('hidden');
            document.getElementById('stage3').classList.remove('hidden');
        }

        function unlockAudio2() {
            if (document.getElementById('pass-stage3').value.toUpperCase() === H3) {
                document.getElementById('lock-audio2').classList.add('hidden');
                document.getElementById('content-audio2').classList.remove('hidden');
                document.getElementById('audio2').play();
            } else { alert("Niepoprawne hasło!"); }
        }
    </script>
</body>
</html>
